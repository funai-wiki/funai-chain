name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        # -short skips 1M-iteration stress tests (TestDustAccumulation_1M,
        # TestFeeConservation_Randomized_1M); those are run separately via
        # `make test-stress` per the guidance at
        # x/settlement/keeper/economic_test.go:21-24.
        run: go test ./... -race -short -count=1 -timeout 10m -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # install-mode: goinstall compiles golangci-lint from source using
          # the runner's Go toolchain (go1.25.7 per go.mod). The default binary
          # mode pulled v1.64.8 prebuilt against go1.24, which rejects our
          # `go 1.25.7` directive with:
          #   "the Go language version (go1.24) used to build golangci-lint is
          #    lower than the targeted Go version (1.25.7)"
          version: v1.64.8
          install-mode: goinstall
          args: --timeout 5m

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build funaid
        run: go build -mod=readonly -ldflags "-s -w" -o build/funaid ./cmd/funaid

      - name: Build funai-node
        run: go build -mod=readonly -ldflags "-s -w" -o build/funai-node ./cmd/funai-node

      - name: Build Docker image (funaid)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: funaid
          push: false
          tags: funai-chain:ci

      - name: Build Docker image (funai-node)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: funai-node
          push: false
          tags: funai-p2p:ci

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build funaid
        run: go build -mod=readonly -o build/funaid ./cmd/funaid

      - name: Init single node
        run: |
          ./build/funaid init smoke-test --chain-id funai-1
          ./build/funaid keys add validator --keyring-backend test
          ./build/funaid genesis add-genesis-account validator 100000000000ufai --keyring-backend test
          ./build/funaid genesis gentx validator 1000000ufai --chain-id funai-1 --keyring-backend test
          ./build/funaid genesis collect-gentxs

      - name: Validate genesis
        run: ./build/funaid genesis validate-genesis

      - name: Run node (background) + smoke test
        run: |
          ./build/funaid start &
          NODE_PID=$!
          sleep 8
          bash scripts/smoke_test.sh
          kill $NODE_PID || true

  e2e-mock:
    # Full P2P pipeline against mock-tgi.py (Python, no GPU). Locks in the
    # chain + 4 P2P nodes + SDK + settlement round-trip so that Go-level
    # PRs cannot merge without exercising the end-to-end path.
    name: E2E Mock
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build all binaries
        # Explicit build step so the timing on the next step is only the
        # e2e pipeline itself — makes failure diagnosis easier.
        run: make build-all

      - name: Run E2E mock pipeline
        # Spins up the 4-node testnet + Python mock TGI and runs the full
        # script (takes ~3–4 min). --no-cleanup keeps logs around so the
        # artifact-upload step below can collect them on failure.
        # Hard cap at 12 min so a hung test fails CI instead of burning minutes.
        run: timeout 720 bash scripts/e2e-mock-inference.sh --no-cleanup

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-mock-logs
          path: |
            /tmp/funai-e2e-real/*.log
            /tmp/mock-tgi.log
          if-no-files-found: ignore
